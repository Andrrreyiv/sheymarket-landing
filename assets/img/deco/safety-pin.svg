<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sp-metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F5F8"/>
      <stop offset="40%" stop-color="#D4D9E3"/>
      <stop offset="100%" stop-color="#7A8295"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="178" rx="70" ry="7" fill="#000" opacity=".22"/>
  <g transform="translate(0 8) rotate(-12 100 100)">
    <!-- coil -->
    <circle cx="48" cy="62" r="18" fill="none" stroke="url(#sp-metal)" stroke-width="6"/>
    <circle cx="48" cy="62" r="12" fill="none" stroke="#9CA5B5" stroke-width="3" opacity=".8"/>
    <!-- top arm -->
    <path d="M48 44 Q70 30 110 30 L170 30" stroke="url(#sp-metal)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- bottom arm -->
    <path d="M48 80 Q60 110 100 130 L160 138" stroke="url(#sp-metal)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- clasp -->
    <path d="M156 22 Q180 24 178 38 Q174 50 158 46" stroke="url(#sp-metal)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M160 138 L172 36" stroke="#5C6477" stroke-width="1.4" fill="none" opacity=".5"/>
  </g>
</svg>
