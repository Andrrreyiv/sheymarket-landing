<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="nd-shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="20%" stop-color="#E0E5EE"/>
      <stop offset="50%" stop-color="#A5AEC0"/>
      <stop offset="80%" stop-color="#5C6477"/>
      <stop offset="100%" stop-color="#2E3445"/>
    </linearGradient>
    <linearGradient id="nd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="nd-thread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD8C8"/>
      <stop offset="40%" stop-color="#D8261C"/>
      <stop offset="100%" stop-color="#7C140E"/>
    </linearGradient>
    <radialGradient id="nd-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(8,4,2,.5)"/>
      <stop offset="65%" stop-color="rgba(8,4,2,.12)"/>
      <stop offset="100%" stop-color="rgba(8,4,2,0)"/>
    </radialGradient>
  </defs>

  <ellipse cx="170" cy="288" rx="110" ry="9" fill="url(#nd-shadow)"/>

  <g transform="translate(160 160) rotate(-28)">
    <!-- needle shaft: long taper to point -->
    <path d="M-130 -3 Q-140 0 -130 3 L120 4 L138 0 L120 -4 Z" fill="url(#nd-shaft)" stroke="rgba(40,46,60,.7)" stroke-width="0.7" stroke-linejoin="round"/>
    <!-- shaft highlight -->
    <rect x="-128" y="-2" width="262" height="1.4" fill="url(#nd-shine)" opacity=".85"/>
    <!-- point reflection -->
    <path d="M122 -3 L138 0 L122 3" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="0.6"/>

    <!-- eye of needle (elongated hole) -->
    <ellipse cx="-110" cy="0" rx="16" ry="2.4" fill="#1A2030" stroke="rgba(30,38,56,.9)" stroke-width="0.5"/>
    <ellipse cx="-110" cy="-0.6" rx="14" ry="1.2" fill="rgba(255,255,255,.35)"/>
    <!-- metallic rim around eye -->
    <ellipse cx="-110" cy="0" rx="18" ry="4.2" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="0.6"/>
    <ellipse cx="-110" cy="0" rx="18" ry="4.2" fill="none" stroke="rgba(40,46,60,.45)" stroke-width="0.3"/>

    <!-- thread going through eye, looping out -->
    <path d="M-94 0 Q-104 -2 -110 0 Q-118 4 -112 8 Q-90 18 -64 8 Q-40 -2 -14 6 Q12 14 38 4 Q62 -6 86 4" stroke="url(#nd-thread)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- thread highlight strand -->
    <path d="M-94 -0.6 Q-104 -2.6 -110 -0.6 Q-118 3.4 -112 7.4 Q-90 17.4 -64 7.4 Q-40 -2.6 -14 5.4 Q12 13.4 38 3.4 Q62 -6.6 86 3.4" stroke="rgba(255,200,190,.55)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- thread loose tail -->
    <path d="M86 4 Q108 8 124 22 Q140 38 130 58" stroke="url(#nd-thread)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M86 3.4 Q108 7.4 124 21.4 Q140 37.4 130 57.4" stroke="rgba(255,200,190,.55)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- frayed end -->
    <path d="M129 56 L132 64" stroke="#7C140E" stroke-width="1" stroke-linecap="round"/>
    <path d="M131 56 L134 62" stroke="#A8201A" stroke-width="0.8" stroke-linecap="round"/>

    <!-- shaft additional highlight near eye -->
    <path d="M-90 -2 L60 -2" stroke="rgba(255,255,255,.55)" stroke-width="0.7"/>
  </g>
</svg>
