<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="sp-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9C290"/>
      <stop offset="40%" stop-color="#C99560"/>
      <stop offset="100%" stop-color="#7E5226"/>
    </linearGradient>
    <linearGradient id="sp-wood-end" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E5226"/>
      <stop offset="20%" stop-color="#C99560"/>
      <stop offset="50%" stop-color="#EFD5A6"/>
      <stop offset="80%" stop-color="#C99560"/>
      <stop offset="100%" stop-color="#7E5226"/>
    </linearGradient>
    <radialGradient id="sp-thread-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF6E64"/>
      <stop offset="55%" stop-color="#D8261C"/>
      <stop offset="100%" stop-color="#6E0E08"/>
    </radialGradient>
    <linearGradient id="sp-thread-strand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB0A8"/>
      <stop offset="50%" stop-color="#D8261C"/>
      <stop offset="100%" stop-color="#7C140E"/>
    </linearGradient>
    <radialGradient id="sp-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(8,4,2,.55)"/>
      <stop offset="70%" stop-color="rgba(8,4,2,.12)"/>
      <stop offset="100%" stop-color="rgba(8,4,2,0)"/>
    </radialGradient>
    <pattern id="sp-grain" x="0" y="0" width="6" height="160" patternUnits="userSpaceOnUse">
      <rect width="6" height="160" fill="none"/>
      <path d="M3 0 Q4.5 40 3 80 Q1.5 120 3 160" stroke="rgba(60,30,8,.18)" stroke-width=".8" fill="none"/>
    </pattern>
  </defs>

  <!-- shadow on ground -->
  <ellipse cx="160" cy="282" rx="118" ry="12" fill="url(#sp-shadow)"/>

  <g transform="translate(160 160)">
    <!-- back flange (slightly visible behind thread) -->
    <ellipse cx="0" cy="-100" rx="110" ry="22" fill="url(#sp-wood-end)"/>
    <ellipse cx="0" cy="-100" rx="110" ry="22" fill="none" stroke="rgba(60,30,8,.45)" stroke-width="1.2"/>
    <ellipse cx="0" cy="-100" rx="38" ry="9" fill="#3A2410"/>
    <ellipse cx="0" cy="-101" rx="36" ry="7" fill="url(#sp-wood-end)" opacity=".5"/>

    <!-- thread cylinder body -->
    <rect x="-92" y="-100" width="184" height="200" fill="url(#sp-thread-body)"/>
    <!-- end caps of cylinder (slight inward taper hint) -->
    <ellipse cx="0" cy="-100" rx="92" ry="14" fill="url(#sp-thread-body)" opacity=".0"/>

    <!-- thread winding strands -->
    <g opacity=".95">
      <path d="M-92 -88 L92 -78" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 -72 L92 -62" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 -56 L92 -46" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 -40 L92 -30" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 -24 L92 -14" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 -8 L92 2" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 8 L92 18" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 24 L92 34" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 40 L92 50" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 56 L92 66" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 72 L92 82" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
      <path d="M-92 88 L92 98" stroke="url(#sp-thread-strand)" stroke-width="2" fill="none"/>
    </g>

    <!-- cylinder vertical shading (left dark, right light) -->
    <rect x="-92" y="-100" width="184" height="200" fill="url(#sp-grain)" opacity=".2"/>
    <rect x="-92" y="-100" width="40" height="200" fill="rgba(60,8,4,.35)"/>
    <rect x="52" y="-100" width="40" height="200" fill="rgba(60,8,4,.35)"/>
    <!-- main highlight band -->
    <rect x="-22" y="-100" width="40" height="200" fill="rgba(255,200,190,.18)"/>
    <rect x="-12" y="-100" width="16" height="200" fill="rgba(255,210,200,.32)"/>

    <!-- front flange (wood) -->
    <ellipse cx="0" cy="100" rx="118" ry="26" fill="url(#sp-wood-end)"/>
    <ellipse cx="0" cy="100" rx="118" ry="26" fill="none" stroke="rgba(60,30,8,.6)" stroke-width="1.4"/>
    <!-- concentric wood rings -->
    <ellipse cx="0" cy="100" rx="92" ry="20" fill="none" stroke="rgba(60,30,8,.35)" stroke-width=".7"/>
    <ellipse cx="0" cy="100" rx="68" ry="14" fill="none" stroke="rgba(60,30,8,.3)" stroke-width=".6"/>
    <ellipse cx="0" cy="100" rx="50" ry="11" fill="none" stroke="rgba(60,30,8,.28)" stroke-width=".6"/>
    <!-- central hole -->
    <ellipse cx="0" cy="100" rx="32" ry="8" fill="#2A1808"/>
    <ellipse cx="0" cy="99" rx="30" ry="6" fill="url(#sp-wood-end)" opacity=".4"/>
    <!-- subtle flange highlight -->
    <path d="M-110 96 Q0 80 110 96" stroke="rgba(255,238,200,.55)" stroke-width="1.2" fill="none"/>

    <!-- loose thread strand hanging from spool -->
    <path d="M82 96 Q96 130 78 158 Q60 186 92 214" stroke="url(#sp-thread-strand)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M83 96 Q97 130 79 158 Q61 186 93 214" stroke="rgba(255,180,170,.5)" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>
