<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="th-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A4254"/>
      <stop offset="22%" stop-color="#8089A0"/>
      <stop offset="48%" stop-color="#E0E5EE"/>
      <stop offset="72%" stop-color="#9BA4B6"/>
      <stop offset="100%" stop-color="#2E3445"/>
    </linearGradient>
    <linearGradient id="th-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#CFD5E0"/>
      <stop offset="100%" stop-color="#6E7689"/>
    </linearGradient>
    <radialGradient id="th-base" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9BA4B6"/>
      <stop offset="100%" stop-color="#3A4254"/>
    </radialGradient>
    <linearGradient id="th-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="th-dimple" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,.6)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,.05)"/>
      <stop offset="100%" stop-color="rgba(40,46,60,.5)"/>
    </radialGradient>
    <radialGradient id="th-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(8,4,2,.55)"/>
      <stop offset="65%" stop-color="rgba(8,4,2,.15)"/>
      <stop offset="100%" stop-color="rgba(8,4,2,0)"/>
    </radialGradient>
  </defs>

  <ellipse cx="160" cy="290" rx="78" ry="10" fill="url(#th-shadow)"/>

  <g transform="translate(160 160)">
    <!-- main body: dome cup -->
    <path d="M-72 110 L-78 -50 Q-78 -110 0 -130 Q78 -110 78 -50 L72 110 Z"
          fill="url(#th-body)" stroke="rgba(28,34,48,.85)" stroke-width="1.4" stroke-linejoin="round"/>

    <!-- top dome cap -->
    <ellipse cx="0" cy="-122" rx="78" ry="20" fill="url(#th-top)" stroke="rgba(28,34,48,.7)" stroke-width="1.2"/>
    <ellipse cx="-12" cy="-126" rx="36" ry="6" fill="rgba(255,255,255,.6)"/>

    <!-- base lip -->
    <ellipse cx="0" cy="110" rx="72" ry="14" fill="url(#th-base)" stroke="rgba(28,34,48,.85)" stroke-width="1.4"/>
    <ellipse cx="0" cy="106" rx="62" ry="9" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="0.8"/>
    <!-- base inner darkness -->
    <ellipse cx="0" cy="112" rx="58" ry="8" fill="rgba(20,24,40,.55)"/>

    <!-- dimples pattern (3 rows around top dome + upper sides) -->
    <g>
      <!-- row 1: top -->
      <g>
        <circle cx="-50" cy="-108" r="4" fill="url(#th-dimple)"/>
        <circle cx="-28" cy="-118" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="-4" cy="-122" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="20" cy="-120" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="44" cy="-114" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="62" cy="-104" r="4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 2 -->
      <g>
        <circle cx="-62" cy="-88" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="-40" cy="-94" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="-16" cy="-98" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="8" cy="-98" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="32" cy="-94" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="54" cy="-88" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="72" cy="-78" r="4.1" fill="url(#th-dimple)"/>
      </g>
      <!-- row 3 -->
      <g>
        <circle cx="-72" cy="-66" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-50" cy="-72" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-26" cy="-74" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-2" cy="-76" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="22" cy="-74" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="46" cy="-72" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="66" cy="-66" r="4.4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 4 (sides) -->
      <g>
        <circle cx="-74" cy="-44" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-52" cy="-48" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-28" cy="-50" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-2" cy="-52" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="24" cy="-50" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="48" cy="-48" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="70" cy="-44" r="4.4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 5 -->
      <g>
        <circle cx="-76" cy="-22" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-54" cy="-24" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-30" cy="-26" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-4" cy="-28" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="22" cy="-26" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="48" cy="-24" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="72" cy="-22" r="4.4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 6 -->
      <g>
        <circle cx="-76" cy="0" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-54" cy="-2" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-30" cy="-4" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-4" cy="-4" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="22" cy="-4" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="48" cy="-2" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="72" cy="0" r="4.4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 7 -->
      <g>
        <circle cx="-76" cy="22" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-54" cy="20" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-30" cy="18" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="-4" cy="18" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="22" cy="18" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="48" cy="20" r="4.4" fill="url(#th-dimple)"/>
        <circle cx="72" cy="22" r="4.4" fill="url(#th-dimple)"/>
      </g>
      <!-- row 8 -->
      <g>
        <circle cx="-74" cy="44" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="-52" cy="42" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="-28" cy="40" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="-2" cy="40" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="24" cy="40" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="48" cy="42" r="4.3" fill="url(#th-dimple)"/>
        <circle cx="70" cy="44" r="4.3" fill="url(#th-dimple)"/>
      </g>
      <!-- row 9 (just above lip) -->
      <g>
        <circle cx="-70" cy="66" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="-48" cy="64" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="-24" cy="62" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="0" cy="62" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="24" cy="62" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="48" cy="64" r="4.2" fill="url(#th-dimple)"/>
        <circle cx="68" cy="66" r="4.2" fill="url(#th-dimple)"/>
      </g>
    </g>

    <!-- vertical glossy strip on left side -->
    <rect x="-58" y="-100" width="14" height="200" fill="url(#th-shine)" opacity=".65"/>
    <rect x="-54" y="-100" width="4" height="200" fill="rgba(255,255,255,.85)" opacity=".7"/>
    <!-- secondary highlight near right edge (darker side) -->
    <rect x="48" y="-90" width="6" height="180" fill="rgba(255,255,255,.18)"/>
    <!-- darker shadow on right edge -->
    <path d="M62 -90 L66 100" stroke="rgba(20,24,40,.4)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
