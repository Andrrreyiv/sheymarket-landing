<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="zp-tape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E3A85"/>
      <stop offset="50%" stop-color="#4D61C4"/>
      <stop offset="100%" stop-color="#2E3A85"/>
    </linearGradient>
    <linearGradient id="zp-slider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EBF0"/>
      <stop offset="50%" stop-color="#B8C0CC"/>
      <stop offset="100%" stop-color="#5C6477"/>
    </linearGradient>
    <linearGradient id="zp-teeth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F5F8"/>
      <stop offset="100%" stop-color="#8A92A6"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="180" rx="60" ry="7" fill="#000" opacity=".22"/>
  <!-- tape left -->
  <rect x="42" y="20" width="38" height="160" fill="url(#zp-tape)"/>
  <!-- tape right -->
  <rect x="120" y="20" width="38" height="160" fill="url(#zp-tape)"/>
  <!-- weave texture -->
  <g opacity=".25" stroke="#1A2156" stroke-width=".8">
    <line x1="46" y1="20" x2="46" y2="180"/>
    <line x1="54" y1="20" x2="54" y2="180"/>
    <line x1="62" y1="20" x2="62" y2="180"/>
    <line x1="70" y1="20" x2="70" y2="180"/>
    <line x1="78" y1="20" x2="78" y2="180"/>
    <line x1="124" y1="20" x2="124" y2="180"/>
    <line x1="132" y1="20" x2="132" y2="180"/>
    <line x1="140" y1="20" x2="140" y2="180"/>
    <line x1="148" y1="20" x2="148" y2="180"/>
    <line x1="156" y1="20" x2="156" y2="180"/>
  </g>
  <!-- teeth -->
  <g fill="url(#zp-teeth)">
    <rect x="80" y="22" width="20" height="8" rx="2"/>
    <rect x="100" y="32" width="20" height="8" rx="2"/>
    <rect x="80" y="42" width="20" height="8" rx="2"/>
    <rect x="100" y="52" width="20" height="8" rx="2"/>
    <rect x="80" y="62" width="20" height="8" rx="2"/>
    <rect x="100" y="72" width="20" height="8" rx="2"/>
    <rect x="80" y="82" width="20" height="8" rx="2"/>
    <rect x="100" y="92" width="20" height="8" rx="2"/>
    <rect x="80" y="102" width="20" height="8" rx="2"/>
    <rect x="100" y="112" width="20" height="8" rx="2"/>
    <rect x="80" y="122" width="20" height="8" rx="2"/>
  </g>
  <!-- slider -->
  <g transform="translate(0 0)">
    <path d="M72 130 L128 130 L132 158 Q132 168 122 168 L78 168 Q68 168 68 158 Z" fill="url(#zp-slider)" stroke="#3A4254" stroke-width="1.4"/>
    <rect x="86" y="138" width="28" height="6" rx="2" fill="#5C6477"/>
    <!-- pull tab -->
    <path d="M100 168 L92 196 L108 196 Z" fill="url(#zp-slider)" stroke="#3A4254" stroke-width="1.2"/>
    <circle cx="100" cy="172" r="3.2" fill="#3A4254"/>
  </g>
</svg>
