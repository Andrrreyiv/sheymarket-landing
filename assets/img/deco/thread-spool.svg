<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ts-spool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4DAA8"/>
      <stop offset="50%" stop-color="#D49E55"/>
      <stop offset="100%" stop-color="#8E6328"/>
    </linearGradient>
    <linearGradient id="ts-thread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7A6B"/>
      <stop offset="50%" stop-color="#E0392F"/>
      <stop offset="100%" stop-color="#8B1A13"/>
    </linearGradient>
    <linearGradient id="ts-shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity=".35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="178" rx="66" ry="9" fill="#000" opacity=".25"/>
  <!-- top cap -->
  <ellipse cx="100" cy="36" rx="62" ry="14" fill="url(#ts-spool)"/>
  <rect x="38" y="36" width="124" height="10" fill="#8E6328"/>
  <!-- thread body -->
  <rect x="46" y="46" width="108" height="100" fill="url(#ts-thread)"/>
  <!-- thread coil lines -->
  <g stroke="#5C0F0A" stroke-width="1" opacity=".55">
    <line x1="46" y1="52" x2="154" y2="52"/>
    <line x1="46" y1="58" x2="154" y2="58"/>
    <line x1="46" y1="64" x2="154" y2="64"/>
    <line x1="46" y1="70" x2="154" y2="70"/>
    <line x1="46" y1="76" x2="154" y2="76"/>
    <line x1="46" y1="82" x2="154" y2="82"/>
    <line x1="46" y1="88" x2="154" y2="88"/>
    <line x1="46" y1="94" x2="154" y2="94"/>
    <line x1="46" y1="100" x2="154" y2="100"/>
    <line x1="46" y1="106" x2="154" y2="106"/>
    <line x1="46" y1="112" x2="154" y2="112"/>
    <line x1="46" y1="118" x2="154" y2="118"/>
    <line x1="46" y1="124" x2="154" y2="124"/>
    <line x1="46" y1="130" x2="154" y2="130"/>
    <line x1="46" y1="136" x2="154" y2="136"/>
    <line x1="46" y1="142" x2="154" y2="142"/>
  </g>
  <!-- thread end hanging -->
  <path d="M154 100 Q170 130 158 160" stroke="#E0392F" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- highlight strip on thread -->
  <rect x="46" y="50" width="108" height="92" fill="url(#ts-shine)"/>
  <!-- bottom cap -->
  <rect x="38" y="146" width="124" height="10" fill="#8E6328"/>
  <ellipse cx="100" cy="156" rx="62" ry="14" fill="url(#ts-spool)"/>
  <ellipse cx="100" cy="156" rx="22" ry="5" fill="#5A3B0E" opacity=".6"/>
  <!-- top center hole -->
  <ellipse cx="100" cy="36" rx="22" ry="5" fill="#5A3B0E" opacity=".6"/>
</svg>
